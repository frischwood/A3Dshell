# Example Configuration: Using Shapefile ROI
#
# This example shows how to use a custom shapefile for the Region of Interest

[GENERAL]
SIMULATION_NAME = shapefile_example_10m
START_DATE = 2023-10-01T00:00:00
END_DATE = 2023-10-31T23:59:59

[INPUT]
# Point of Interest (POI) - still needed for station selection and reference
EAST_epsg2056 = 783500
NORTH_epsg2056 = 189500
altLV95 = 1560

# Shapefile ROI mode
USE_SHP_ROI = true

# IMPORTANT: Update this path to your shapefile!
# Can be absolute path or relative to working directory
# Supports .shp files or .zip archives containing shapefiles
ROI_SHAPEFILE = /path/to/your/study_area.shp

# Or use a relative path (from where you run the command):
# ROI_SHAPEFILE = ../data/roiShp/my_area.shp

# Buffer size for IMIS station selection (meters)
# Larger buffer = more stations to choose from
BUFFERSIZE = 100000

[OUTPUT]
# Output coordinate system
OUT_COORDSYS = CH1903+

# Grid spacing (resolution)
GSD = 10.0

# Reference DEM resolution from Swisstopo
# 2.0 = standard, 0.5 = high resolution
GSD_ref = 2.0

# Additional output formats
DEM_ADDFMTLIST = tif

# Mesh format
MESH_FMT = vtu

[MAPS]
# Generate horizon plot (requires computeHorayzon.py)
PLOT_HORIZON = false

[A3D]
# Use Groundeye BRDF model (requires brdf-files)
USE_GROUNDEYE = false

# Use SwissTLMRegio for land use classification
USE_LUS_TLM = true

# Constant land use value (only used if USE_LUS_TLM = false)
LUS_PREVAH_CST = 11500

# Generate 3D PV panel mesh
DO_PVP_3D = false
PVP_3D_FMT = vtu

# Snowpack binary path
SP_BIN_PATH = snowpack
