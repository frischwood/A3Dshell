# Example Configuration for A3DShell A3Dshell
#
# This is a working example that you can use as a template.
# Adjust the parameters below to match your simulation requirements.

[GENERAL]
# Simulation identifier (no spaces allowed)
SIMULATION_NAME = example_10m

# Simulation period (ISO 8601 format)
START_DATE = 2023-10-01T00:00:00
END_DATE = 2023-10-31T23:59:59

[INPUT]
# Point of Interest (POI) coordinates in EPSG:2056 (CH1903+)
# Example: Davos area
EAST_epsg2056 = 783500
NORTH_epsg2056 = 189500
altLV95 = 1560

# ROI (Region of Interest) mode
# If USE_SHP_ROI = false: Creates square bounding box of size ROI (meters) around POI
# If USE_SHP_ROI = true: Uses shapefile specified in ROI_SHAPEFILE
USE_SHP_ROI = false
ROI = 1000

# ROI Shapefile (only used if USE_SHP_ROI = true)
# Specify absolute path to your shapefile
# ROI_SHAPEFILE = /path/to/your/roi.shp

# Buffer size for IMIS station selection (meters)
# Larger buffer = more stations to choose from
BUFFERSIZE = 50000

[OUTPUT]
# Output coordinate system
# Supported: CH1903+, CH1903
# (WGS84 and CHTRS95 may have issues - not recommended)
OUT_COORDSYS = CH1903+

# Grid Spacing (GSD) - resolution of output DEM/LUS grids (meters)
GSD = 10.0

# Reference DEM resolution from Swisstopo (meters)
# Options: 2.0 (standard) or 0.5 (high resolution)
GSD_ref = 2.0

# Additional DEM output formats (comma-separated, optional)
# Options: tif, or leave empty
DEM_ADDFMTLIST = tif

# Mesh format for 3D visualization (optional)
# Options: vtu, vtk, stl
MESH_FMT = vtu

[MAPS]
# Generate horizon plot for POI (requires computeHorayzon.py)
# Set to false if not needed or dependencies missing
PLOT_HORIZON = false

[A3D]
# Use Groundeye BRDF model (requires brdf-files)
USE_GROUNDEYE = false

# Land Use Source
# If USE_LUS_TLM = true: Use SwissTLMRegio for land use classification
# If USE_LUS_TLM = false: Use constant value LUS_PREVAH_CST
USE_LUS_TLM = true

# Constant land use value (only used if USE_LUS_TLM = false)
# Format: 1LLCD where LL is PREVAH code (e.g., 11500 for mixed vegetation)
LUS_PREVAH_CST = 11500

# Generate 3D PV panel mesh (requires mesh generation)
DO_PVP_3D = false
PVP_3D_FMT = vtu

# Snowpack binary path
# Can be absolute path or command if in PATH
SP_BIN_PATH = snowpack

# Note: A3D execution is removed in A3Dshell
# The following parameters are not used but kept for compatibility:
# RUN_A3D = false
# MIO_BIN_PATH = data_converter
# A3D_BIN_PATH = alpine3d
# darwinM_arch = false
