# Example Configuration: Quick Test
#
# Fast testing configuration with small ROI, coarse resolution, and short period
# Useful for testing the setup and pipeline

[GENERAL]
SIMULATION_NAME = quick_test_20m
START_DATE = 2023-10-01T00:00:00
END_DATE = 2023-10-02T23:59:59  # Just 2 days

[INPUT]
# Example: Gondo area (small valley)
EAST_epsg2056 = 645000
NORTH_epsg2056 = 115000
altLV95 = 1500

# Very small ROI for quick testing (500m x 500m)
USE_SHP_ROI = false
ROI = 500

# Standard buffer
BUFFERSIZE = 50000

[OUTPUT]
OUT_COORDSYS = CH1903+

# Coarse resolution for speed
GSD = 20.0

# Standard reference DEM
GSD_ref = 2.0

DEM_ADDFMTLIST =

MESH_FMT = vtu

[MAPS]
# Skip horizon for speed
PLOT_HORIZON = false

[A3D]
USE_GROUNDEYE = false

# Use constant land use for speed (no TLM download)
USE_LUS_TLM = false
LUS_PREVAH_CST = 11500

DO_PVP_3D = false
PVP_3D_FMT = vtu

# Path to Snowpack binary (system-installed in Docker, or absolute/relative path for native install)
SP_BIN_PATH = snowpack
