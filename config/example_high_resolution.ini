# Example Configuration: High Resolution Simulation
#
# This example uses fine resolution (5m GSD with 0.5m reference DEM)
# Note: This will take longer to process and create larger output files

[GENERAL]
SIMULATION_NAME = highres_5m
START_DATE = 2023-10-01T00:00:00
END_DATE = 2023-10-07T23:59:59  # 1 week for testing

[INPUT]
# Example: Davos area
EAST_epsg2056 = 783500
NORTH_epsg2056 = 189500
altLV95 = 1560

# Small ROI for high-resolution testing (1km x 1km)
USE_SHP_ROI = false
ROI = 1000

# Larger buffer to find more stations
BUFFERSIZE = 100000

[OUTPUT]
OUT_COORDSYS = CH1903+

# Fine resolution output
GSD = 5.0

# High-resolution reference DEM from Swisstopo
GSD_ref = 0.5

# Save DEM in multiple formats
DEM_ADDFMTLIST = tif

MESH_FMT = vtu

[MAPS]
PLOT_HORIZON = false

[A3D]
USE_GROUNDEYE = false

# Use SwissTLMRegio for detailed land use
USE_LUS_TLM = true

LUS_PREVAH_CST = 11500

DO_PVP_3D = false
PVP_3D_FMT = vtu

SP_BIN_PATH = snowpack
