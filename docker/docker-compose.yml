version: '3.8'

services:
  a3dshell:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: a3dshell:latest
    container_name: a3dshell

    # Mount volumes for persistence
    volumes:
      # Output directory - simulation results
      - ../output:/app/a3dshell/output

      # Cache directory - downloaded DEM/maps (persistent across runs)
      - ../cache:/app/a3dshell/cache

      # Config directory - your configuration files
      - ../config:/app/a3dshell/config

      # Optional: Mount custom shapefiles
      # - /path/to/your/shapefiles:/app/shapefiles:ro

    # Port mapping for GUI
    ports:
      - "8501:8501"

    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1

    # Default command - starts GUI
    # Override for CLI: docker-compose run a3dshell python -m src.cli --config config/example_basic.ini
    command: ["streamlit", "run", "gui_app.py", "--server.address=0.0.0.0", "--server.port=8501", "--server.headless=true"]

    # Limit resources (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '4'
    #       memory: 8G
    #     reservations:
    #       cpus: '2'
    #       memory: 4G
